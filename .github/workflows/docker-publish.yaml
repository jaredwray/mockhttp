name: docker-publish

on:
  workflow_dispatch:
  release:
    types: [released]

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          package-manager-cache: false
      - run: corepack enable
      - run: pnpm install --frozen-lockfile
      - run: pnpm test:ci

  build:
    name: Build
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          package-manager-cache: false
      - run: corepack enable
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/
          if-no-files-found: error
          retention-days: 1

  publish:
    name: Publish to Docker Hub
    needs: build
    runs-on: ubuntu-latest
    environment: docker
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          package-manager-cache: false

      - run: corepack enable

      - run: pnpm install --frozen-lockfile

      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - name: Set version variable
        run: |
          VERSION=$(node -p 'require("./package.json").version')
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker Image
        run: docker build -t jaredwray/mockhttp:${{ env.VERSION }} -t jaredwray/mockhttp:latest .

      - name: Push Docker image (version)
        run: docker push docker.io/jaredwray/mockhttp:${{ env.VERSION }}

      - name: Push Docker image (latest)
        run: docker push docker.io/jaredwray/mockhttp:latest

      - name: Build Docker Markdown
        run: pnpm docker:readme

      - name: Update Docker Hub description
        uses: peter-evans/dockerhub-description@v5
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
          repository: jaredwray/mockhttp
          short-description: ${{ github.event.repository.description }}
          readme-filepath: ./DOCKER.md
